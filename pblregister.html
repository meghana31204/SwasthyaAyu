<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayurvedic Treatment - Register</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/gh/creativetimofficial/tailwind-starter-kit/compiled-tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        header {
            width: 100%; /* Ensures full width */
            height: 100px; /* Adjust height as needed */
            display: flex;
            justify-content: flex-start; /* Aligns logo to the left */
            align-items: center;
            padding-left: 20px; /* Adjust padding as needed */
            background-color: #fff; /* Optional */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Optional */
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-image {
            width: 120px; /* Adjust this value to your liking */
            height: auto; /* Maintains aspect ratio */
            object-fit: contain; /* Prevents the image from being cut off */
        }

        .logo-text {
            font-size: 24px; /* Adjust font size for the logo text */
            font-weight: bold;
            font-family: 'Roboto', sans-serif;
            color: darkblue;
            margin-left: 10px; /* Space between logo and text */
        }

        .register-container {
            background: #fff;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            width: 350px;
            margin-top: 20px; /* Space between header and register form */
        }
		.register-container h2{
			text-align: center;
			font-weight: bolder;
			margin: 20px 0;
			font-size: 30px;
		}

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .login-link {
            text-align: center;
            margin-top: 10px;
        }

        .login-link a {
            color: #007bff;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="https://www.pngarts.com/files/12/Ayurveda-Logo-Free-PNG-Image.png" class="logo-image" alt="AyuCare Logo" />
            <h2 class="logo-text">Swasthya Ayu</h2>
        </div>
    </header>

    <div class="register-container">
        <h2>Create an Account</h2>
        <form id="registerForm">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <a href="predictingpbl.html"><button type="button" onclick="handleRegister()">Register</button></a>
        </form>
        <div class="login-link">
            <p>Already have an account? <a href="pbllogin.html">Login here</a></p>
        </div>
    </div>

    <script>
        function handleRegister() {
            const fullName = document.getElementById("fullName").value;
            const email = document.getElementById("email").value;
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            // Simulating a registration process (replace with a real backend call)
            alert("Registration Successful!");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
